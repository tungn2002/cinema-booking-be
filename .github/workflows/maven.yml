# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: mvn -B package --file pom.xml
    - name: Recreate Dockerfile
      run: |
        cat <<EOF > Dockerfile
        FROM eclipse-temurin:17-jdk-alpine
        WORKDIR /app
        COPY target/CinemaBookingApi-3.3.0.jar app.jar
        COPY src/main/resources/application-prod.properties /app/application-prod.properties
        EXPOSE 8080
        ENTRYPOINT ["java", "-jar", "app.jar", "--spring.profiles.active=prod", "--spring.config.location=file:/app/application-prod.properties"]
        EOF
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
        # Login docker
    - name: Login to Docker Hub
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
       username: ${{ secrets.DOCKERHUB_USERNAME }}
       password: ${{ secrets.DOCKERHUB_TOKEN }}

    # Build Docker Image và Push
    - name: Build and push Docker image
      if: github.event_name != 'pull_request'
      uses: docker/build-push-action@v5
      with:
       context: .
       push: true
       # Thay 'my-app-name' bằng tên project bạn muốn đặt trên Docker Hub
       tags: ${{ secrets.DOCKERHUB_USERNAME }}/my-java-app:latest